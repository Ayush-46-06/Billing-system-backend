spring:
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/billing_system_db?createDatabaseIfNotExist=true}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect

  security:
    admin-secret: ${ADMIN_SECRET}
    manager-secret: ${MANAGER_SECRET}
    user:
      name: disable

brevo:
  api:
    key: ${BREVO_API_KEY:}
  sender:
    email: ${BREVO_SENDER_EMAIL:info@billing.com}
    name: ${BREVO_SENDER_NAME:Billing System}

cloudinary:
  cloud-name: ${CLOUDINARY_CLOUD_NAME}
  api-key: ${CLOUDINARY_API_KEY}
  api-secret: ${CLOUDINARY_API_SECRET}

logging:
  level:
    org.springframework.security: DEBUG
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8"/>
<title>Invoice - [[${invoice.invoiceNumber}]]</title>
<style>
/* Basic reset */
body, html {
    margin:0; padding:0;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background:#f6f7fb;
    color:#333;
}

/* Container */
.invoice-container {
    max-width: 800px;
    margin: 40px auto;
    background: #fff;
    padding: 40px;
    border-radius: 10px;
    box-shadow: 0 5px 20px rgba(0,0,0,0.1);
}

/* Header */
.header {
    display:flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 40px;
}
.company-info h1 {
    margin:0;
    color:#2c3e50;
}
.company-info p {
    margin:2px 0;
    font-size: 14px;
    color:#555;
}
.invoice-info p {
    margin:2px 0;
    font-size:14px;
}

/* Logo */
.company-info img.company-logo {
    max-height: 60px;
    display:block;
    margin-top:10px;
}

/* Client box */
.client-box {
    background:#f4f6f8;
    padding:20px;
    border-radius:5px;
    margin-bottom: 30px;
}
.client-box h3 {
    margin:0 0 10px 0;
}

/* Items table */
table {
    width:100%;
    border-collapse: collapse;
    margin-bottom:30px;
}
table th, table td {
    padding:12px 10px;
    text-align:left;
}
table th {
    background:#2c3e50;
    color:#fff;
    font-weight: 600;
}
table td {
    border-bottom: 1px solid #e1e4e8;
}

/* Totals box */
.totals {
    width: 300px;
    margin-left:auto;
}
.totals table td {
    padding:8px 5px;
    border:none;
}
.totals .grand-total {
    font-weight:bold;
    font-size:16px;
    color:#2c3e50;
}

/* Status */
.status {
    margin-top:20px;
    font-weight:bold;
    font-size:14px;
}

/* Footer */
.footer {
    margin-top:40px;
    text-align:center;
    color:#777;
    font-size:12px;
}

.company-logo {
    width: 150px;   /* desired width */
    height: auto;   /* maintain aspect ratio */
    margin-bottom: 10px;
}

</style>
</head>
<body>

<div class="invoice-container">

<!-- Header -->
<div class="header">
    <div class="company-info">
        <!-- <h1>Athenura</h1> -->
        <img th:src="@{classpath:/static/images/Athenura.png}" alt="Athenura Logo" class="company-logo"/>
        <p>123 Corporate Blvd, City, Country</p>
        <p>Email: info@billing.com | Phone: +91 9876543210</p>
    </div>

    <div class="invoice-info">
        <p><b>Invoice No:</b> <span th:text="${invoice.invoiceNumber}"></span></p>
        <p><b>Date:</b> <span th:text="${invoice.invoiceDate}"></span></p>
        <p><b>Due Date:</b> <span th:text="${invoice.dueDate}"></span></p>
    </div>
</div>

<!-- Client Info -->
<div class="client-box">
    <h3>Bill To:</h3>
    <p><b>Name:</b> <span th:text="${invoice.clientName}"></span></p>
    <p><b>Email:</b> <span th:text="${invoice.clientEmail}"></span></p>
</div>

<!-- Items Table -->
<table>
    <thead>
        <tr>
            <th>S-No</th>
            <th>Service</th>
            <th>Description</th>
            <th>Amount</th>
        </tr>
    </thead>
    <tbody>
        <tr th:each="item, iter : ${invoice.items}">
            <td th:text="${iter.count}"></td>
            <td th:text="${item.serviceName}"></td>
            <td th:text="${item.description}"></td>
            <td th:text="${item.lineTotal}"></td>
        </tr>
    </tbody>
</table>

<!-- Totals -->
<div class="totals">
    <table>
        <tr>
            <td>Subtotal:</td>
            <td th:text="${invoice.subtotal}"></td>
        </tr>
        <tr th:if="${invoice.taxType.name()=='CGST_SGST'}">
            <td>CGST:</td>
            <td th:text="${invoice.cgst}"></td>
        </tr>
        <tr th:if="${invoice.taxType.name()=='CGST_SGST'}">
            <td>SGST:</td>
            <td th:text="${invoice.sgst}"></td>
        </tr>
        <tr th:if="${invoice.taxType.name()=='IGST'}">
            <td>IGST:</td>
            <td th:text="${invoice.igst}"></td>
        </tr>
        <tr>
            <td>Tax Total:</td>
            <td th:text="${invoice.taxTotal}"></td>
        </tr>
        <tr class="grand-total">
            <td>Grand Total:</td>
            <td th:text="${invoice.grandTotal}"></td>
        </tr>
    </table>
</div>


<!-- Footer -->
<div class="footer">
    <p>Thank you for your business. For support, contact support@billing.com</p>
</div>

</div>
</body>
</html>
